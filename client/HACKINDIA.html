<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HackIndia</title>

  <!-- Magical Font -->
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="HACKINDIA.css">
</head>

<body>

  <!-- Background -->
  <div class="bg-overlay"></div>

  <!-- Header -->
  <div class="top-header">
    <h1>TruScan</h1>
    <p>Fact Check Before You Forward</p>
  </div>

  <!-- Owl -->
  <img src="owl.png" class="owl" />

  <!-- MAIN BOX -->
  <div class="card">

    <label>Enter Message or Paste Text:</label>
    <textarea id="textInput" placeholder="Paste message here..."></textarea>

    <button id="submitBtn">✨ Verify Message</button>

    <div id="resultContainer"></div>

  </div>

  <div class="footer">
    © 2026 TruScan • Verify before you trust
  </div>

  <script src="HACKINDIA.js"></script>
</body>
</html>
